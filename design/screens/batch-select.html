<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FunkyLesson · 选择批次</title>
<style>
  :root {
    --bg: #f5f5f7; --surface: #ffffff;
    --fg: #1d1d1f; --fg-secondary: #6e6e73; --fg-tertiary: #86868b;
    --accent: #0071e3; --accent-soft: #e8f1fd;
    --border: #d2d2d7; --border-strong: #c7c7cc;
    --ring: rgba(0,113,227,.28);
    --radius-field: 12px; --radius-card: 16px;
    --shadow-row: 0 1px 2px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.05);
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Display","SF Pro Text","Helvetica Neue","PingFang SC","Microsoft YaHei",sans-serif;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    --ease: cubic-bezier(.4,0,.2,1);
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family:var(--font); color:var(--fg); background:var(--bg);
    -webkit-font-smoothing:antialiased; min-height:100vh; }
  .appbar { position:sticky; top:0; display:grid; grid-template-columns:40px 1fr 40px;
    align-items:center; height:52px; padding:0 16px;
    background:rgba(245,245,247,.8); backdrop-filter:saturate(180%) blur(20px);
    border-bottom:1px solid rgba(0,0,0,.06); }
  .icon-btn { width:36px; height:36px; border:none; background:transparent; color:var(--fg-secondary);
    border-radius:10px; display:grid; place-items:center; cursor:pointer; transition:background .15s; }
  .icon-btn:hover { background:rgba(0,0,0,.05); }
  .icon-btn svg { width:20px; height:20px; }
  .appbar__title { text-align:center; font-size:16px; font-weight:600; letter-spacing:-.01em; }
  .wrap { max-width:480px; margin:0 auto; padding:28px 20px 40px; }
  .hint { font-size:14px; color:var(--fg-tertiary); text-align:center; margin:0 0 22px; line-height:1.5; }
  .list { display:flex; flex-direction:column; gap:12px; }
  .batch {
    display:grid; grid-template-columns:44px 1fr 20px; gap:14px; align-items:center;
    width:100%; text-align:left; padding:16px; background:var(--surface);
    border:1px solid var(--border); border-radius:var(--radius-card); cursor:pointer;
    box-shadow:var(--shadow-row); transition:transform .18s var(--ease), border-color .15s, box-shadow .18s;
  }
  .batch:hover { transform:translateY(-1px); border-color:var(--accent); box-shadow:0 2px 4px rgba(0,0,0,.05), 0 12px 28px rgba(0,113,227,.12); }
  .batch__icon { width:44px; height:44px; border-radius:12px; display:grid; place-items:center;
    background:var(--accent-soft); color:var(--accent); }
  .batch__icon svg { width:22px; height:22px; }
  .batch__name { font-size:15px; font-weight:600; }
  .batch__code { font-size:12.5px; color:var(--fg-tertiary); margin-top:3px; }
  .batch__code .mono { font-family:var(--mono); }
  .batch__go { color:var(--fg-tertiary); display:grid; place-items:center; }
  .batch__go svg { width:18px; height:18px; }
  @media (prefers-reduced-motion: reduce) { * { transition:none !important; } }
</style>
</head>
<body>
  <div class="appbar">
    <button class="icon-btn" aria-label="返回"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg></button>
    <div class="appbar__title">选择批次</div>
    <span></span>
  </div>
  <main class="wrap">
    <p class="hint">请选择要参与的选课批次，进入后即可获取课程并开始抢课。</p>
    <div class="list">
      <button class="batch">
        <span class="batch__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></span>
        <span><span class="batch__name">2026 春季学期 · 第一轮选课</span><span class="batch__code">批次代码：<span class="mono">2026SPRING-01</span></span></span>
        <span class="batch__go"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></span>
      </button>
      <button class="batch">
        <span class="batch__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></span>
        <span><span class="batch__name">2026 春季学期 · 补选阶段</span><span class="batch__code">批次代码：<span class="mono">2026SPRING-02</span></span></span>
        <span class="batch__go"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></span>
      </button>
    </div>
  </main>
</body>
</html>
