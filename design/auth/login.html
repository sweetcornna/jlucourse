<!-- @dsCard group="Auth" name="Login — Apple style" -->
<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FunkyLesson · 登录</title>
<style>
  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --fg: #1d1d1f;
    --fg-secondary: #6e6e73;
    --fg-tertiary: #86868b;
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --accent-active: #006edb;
    --border: #d2d2d7;
    --border-strong: #c7c7cc;
    --ring: rgba(0, 113, 227, 0.28);
    --radius-field: 12px;
    --radius-card: 22px;
    --shadow-card: 0 20px 48px rgba(0, 0, 0, 0.10), 0 2px 8px rgba(0, 0, 0, 0.04);
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
      "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
    --ease: cubic-bezier(0.4, 0, 0.2, 1);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: var(--font);
    color: var(--fg);
    background: var(--bg);
    background-image: radial-gradient(1200px 600px at 50% -10%, #ffffff 0%, rgba(255, 255, 255, 0) 60%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .card {
    width: 100%;
    max-width: 400px;
    background: var(--surface);
    border-radius: var(--radius-card);
    box-shadow: var(--shadow-card);
    padding: 40px 36px 32px;
    animation: rise 0.5s var(--ease) both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(8px) scale(0.98); }
    to { opacity: 1; transform: none; }
  }
  .brand { text-align: center; margin-bottom: 28px; }
  .brand__mark {
    width: 56px;
    height: 56px;
    margin: 0 auto 14px;
    border-radius: 16px;
    display: grid;
    place-items: center;
    color: #fff;
    background: linear-gradient(135deg, #0a84ff, #0071e3);
    box-shadow: 0 6px 16px rgba(0, 113, 227, 0.32);
  }
  .brand__mark svg { width: 30px; height: 30px; }
  .brand__name { font-size: 24px; font-weight: 600; letter-spacing: -0.02em; }
  .brand__sub { font-size: 14px; color: var(--fg-tertiary); margin-top: 4px; }
  .field { margin-bottom: 16px; display: block; }
  .field__label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--fg-secondary);
    margin: 0 0 6px 2px;
  }
  .input {
    width: 100%;
    height: 44px;
    padding: 0 14px;
    font-size: 15px;
    color: var(--fg);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-field);
    outline: none;
    font-family: inherit;
    transition: border-color 0.15s var(--ease), box-shadow 0.15s var(--ease);
  }
  .input::placeholder { color: #b0b0b6; }
  .input:hover { border-color: var(--border-strong); }
  .input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--ring); }
  .captcha-row {
    display: grid;
    grid-template-columns: 1fr 96px 44px;
    gap: 10px;
    align-items: center;
  }
  .captcha-img {
    height: 44px;
    border: 1px solid var(--border);
    border-radius: var(--radius-field);
    display: grid;
    place-items: center;
    background: #fbfbfd;
    color: var(--fg-secondary);
    font: 600 18px/1 var(--font);
    letter-spacing: 0.18em;
    user-select: none;
    overflow: hidden;
  }
  .captcha-refresh {
    height: 44px;
    width: 44px;
    border: 1px solid var(--border);
    border-radius: var(--radius-field);
    background: var(--surface);
    color: var(--fg-secondary);
    display: grid;
    place-items: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.25s var(--ease);
  }
  .captcha-refresh:hover { background: #f5f5f7; border-color: var(--border-strong); }
  .captcha-refresh:active { transform: rotate(-90deg); }
  .captcha-refresh svg { width: 18px; height: 18px; }
  .status { min-height: 18px; font-size: 13px; color: var(--fg-tertiary); text-align: center; margin: 14px 0 8px; }
  .btn {
    width: 100%;
    height: 48px;
    border: none;
    border-radius: var(--radius-field);
    background: var(--accent);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
    transition: background 0.15s var(--ease), transform 0.12s var(--ease), box-shadow 0.15s;
  }
  .btn:hover { background: var(--accent-hover); }
  .btn:active { transform: scale(0.985); background: var(--accent-active); }
  .btn:focus-visible { box-shadow: 0 0 0 4px var(--ring); }
  .gh {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 18px;
    font-size: 13px;
    color: var(--fg-tertiary);
    text-decoration: none;
  }
  .gh:hover { color: var(--fg-secondary); }
  .gh svg { width: 15px; height: 15px; }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>
  <main class="card">
    <div class="brand">
      <div class="brand__mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none"><path d="M13 2 4.6 13.2a.8.8 0 0 0 .64 1.28H10.2l-1.1 7.2a.5.5 0 0 0 .9.38L19.4 10.8a.8.8 0 0 0-.64-1.28H13.7L14.9 2.6A.5.5 0 0 0 13 2Z" fill="currentColor"/></svg>
      </div>
      <div class="brand__name">FunkyLesson</div>
      <div class="brand__sub">吉林大学选课助手</div>
    </div>

    <label class="field">
      <span class="field__label">学号</span>
      <input class="input" type="text" inputmode="numeric" autocomplete="username" placeholder="请输入学号" />
    </label>

    <label class="field">
      <span class="field__label">密码</span>
      <input class="input" type="password" autocomplete="current-password" placeholder="请输入密码（默认身份证后6位）" />
    </label>

    <div class="field">
      <span class="field__label">验证码</span>
      <div class="captcha-row">
        <input class="input" type="text" maxlength="4" autocomplete="off" placeholder="请输入验证码" />
        <div class="captcha-img" role="img" aria-label="验证码图片">7K9Q</div>
        <button class="captcha-refresh" type="button" aria-label="刷新验证码" title="刷新验证码">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
        </button>
      </div>
    </div>

    <p class="status">请登录</p>

    <button class="btn" type="button">登录</button>

    <a class="gh" href="https://github.com/Islatri/funky-lesson">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 .5A11.5 11.5 0 0 0 .5 12a11.5 11.5 0 0 0 7.86 10.92c.58.1.79-.25.79-.56v-2c-3.2.7-3.88-1.37-3.88-1.37-.53-1.34-1.3-1.7-1.3-1.7-1.06-.72.08-.71.08-.71 1.17.08 1.79 1.2 1.79 1.2 1.04 1.78 2.73 1.27 3.4.97.1-.76.41-1.27.74-1.56-2.55-.29-5.24-1.28-5.24-5.7 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11 11 0 0 1 5.8 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.23 2.76.11 3.05.74.81 1.19 1.84 1.19 3.1 0 4.43-2.7 5.4-5.27 5.69.42.36.79 1.07.79 2.16v3.2c0 .31.21.67.8.56A11.5 11.5 0 0 0 23.5 12 11.5 11.5 0 0 0 12 .5Z"/></svg>
      <span>在 GitHub 上查看源码</span>
    </a>
  </main>
</body>
</html>
